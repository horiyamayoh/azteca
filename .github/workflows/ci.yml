name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-18 \
            clang-format-18 \
            clang-tidy-18 \
            cmake \
            ninja-build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Configure
        run: cmake --preset ci-clang

      - name: Build
        run: cmake --build --preset ci-clang --parallel

      - name: Check
        run: cmake --build --preset ci-clang --target check

  sanitizers:
    name: ASan UBSan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-18 \
            clang-format-18 \
            clang-tidy-18 \
            cmake \
            ninja-build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure
        run: cmake --preset asan-clang

      - name: Build
        run: cmake --build --preset asan-clang --parallel

      - name: Test
        run: ctest --preset asan-clang
